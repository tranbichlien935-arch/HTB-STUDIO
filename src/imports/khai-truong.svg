  <circle cx="430" cy="342" r="10" fill="#F4A261" opacity=".8"/>
  <circle cx="452" cy="337" r="8"  fill="#E9C46A" opacity=".7"/>
  <circle cx="443" cy="352" r="4"  fill="#344E41" opacity=".55"/>
  <circle cx="462" cy="342" r="3"  fill="#344E41" opacity=".5"/>
  <line x1="445" y1="362" x2="450" y2="392" stroke="#588157" stroke-width="2"/>
  <line x1="463" y1="355" x2="469" y2="392" stroke="#588157" stroke-width="2"/>
  <path d="M448 376 Q456 368 452 360" stroke="#A3B18A" stroke-width="1.5" fill="none"/>

  <!-- sparkles -->
  <g transform="translate(300,153)"><line x1="-6" y1="0" x2="6" y2="0" stroke="#E9C46A" stroke-width="1.5" stroke-linecap="round"/><line x1="0" y1="-6" x2="0" y2="6" stroke="#E9C46A" stroke-width="1.5" stroke-linecap="round"/><line x1="-4" y1="-4" x2="4" y2="4" stroke="#E9C46A" stroke-width="1" stroke-linecap="round"/><line x1="4" y1="-4" x2="-4" y2="4" stroke="#E9C46A" stroke-width="1" stroke-linecap="round"/></g>
  <g transform="translate(220,160)"><line x1="-5" y1="0" x2="5" y2="0" stroke="#E9C46A" stroke-width="1.5" stroke-linecap="round"/><line x1="0" y1="-5" x2="0" y2="5" stroke="#E9C46A" stroke-width="1.5" stroke-linecap="round"/></g>
  <g transform="translate(380,158)"><line x1="-5" y1="0" x2="5" y2="0" stroke="#E9C46A" stroke-width="1.5" stroke-linecap="round"/><line x1="0" y1="-5" x2="0" y2="5" stroke="#E9C46A" stroke-width="1.5" stroke-linecap="round"/></g>

  <text x="300" y="396" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#A3B18A" opacity=".55" letter-spacing="3">HBT STUDIO</text>
